<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CivicIQ | Your Election Education Journey</title>
    <meta name="description" content="CivicIQ is a non-partisan election education platform helping citizens navigate the voting process with AI-guided journeys and multi-language support." />
    <meta name="keywords" content="election, voting, civic education, gemini ai, india elections, voter registration" />

    <!-- Open Graph -->
    <meta property="og:title" content="CivicIQ | Your Election Education Journey" />
    <meta property="og:description" content="Master the election process with AI-guided journeys." />
    <meta property="og:type" content="website" />

    <!-- Security: no-referrer for cross-origin navigations -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Security: prevent MIME-type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Security: block framing -->
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- Security: XSS auditor (legacy browsers) -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />

    <!-- Content Security Policy (strict, no unsafe-inline for scripts) -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' https://apis.google.com https://www.gstatic.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://*.googleusercontent.com https://*.firebase.google.com;
      connect-src 'self'
        https://*.googleapis.com
        https://*.firebaseio.com
        wss://*.firebaseio.com
        https://*.firebase.google.com
        https://generativelanguage.googleapis.com;
      frame-src 'none';
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
      block-all-mixed-content;
    " />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
