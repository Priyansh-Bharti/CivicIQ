worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Hide server version ────────────────────────────────────────────────────
    server_tokens off;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff font/woff2;

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=static:10m  rate=200r/m;

    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # ── Apply Rate Limits ─────────────────────────────────────────────────
        limit_req zone=global burst=20 nodelay;
        limit_req_status 429;

        # ── HSTS (1 year, includeSubDomains) ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ── Clickjacking / MIME / Referrer ────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Permissions Policy (deny all sensitive APIs) ──────────────────────
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

        # ── Cross-Origin Policies ─────────────────────────────────────────────
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;

        # ── Content Security Policy (strict) ──────────────────────────────────
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' https://apis.google.com https://www.gstatic.com;
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            font-src 'self' https://fonts.gstatic.com;
            img-src 'self' data: blob: https://*.googleusercontent.com https://*.firebase.google.com;
            connect-src 'self'
                https://*.googleapis.com
                https://*.firebaseio.com
                wss://*.firebaseio.com
                https://*.firebase.google.com
                https://generativelanguage.googleapis.com;
            frame-src 'none';
            frame-ancestors 'none';
            object-src 'none';
            base-uri 'self';
            form-action 'self';
            upgrade-insecure-requests;
            block-all-mixed-content;
        " always;

        # ── SPA Routing ───────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
            limit_req zone=global burst=20 nodelay;
        }

        # ── Static Assets: 1-year cache ───────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable, no-transform";
            limit_req zone=static burst=50 nodelay;
        }

        # ── index.html: no cache ──────────────────────────────────────────────
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # ── Block common attack paths ─────────────────────────────────────────
        location ~ /\. { deny all; access_log off; log_not_found off; }
        location ~* \.(env|log|sql|bak|sh|git)$ { deny all; }

        # ── 404 → SPA ─────────────────────────────────────────────────────────
        error_page 404 /index.html;
        error_page 429 @rate_limited;

        location @rate_limited {
            return 429 '{"error":"Too many requests. Please slow down."}';
            add_header Content-Type application/json always;
        }
    }
}
